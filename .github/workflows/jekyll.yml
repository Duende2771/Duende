name: Build and Deploy to Github Pages

on:
  push:
    branches:
      - main

# Ensure the GITHUB_TOKEN has the required Pages permission
permissions:
  contents: read
  pages: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # Set up Ruby and enable bundler caching
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          cache: bundler

      # Use GitHub Actions' cache to cache dependencies on servers (optional extra cache)
      - uses: actions/cache@v3
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-gems-${{ hashFiles('**/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-gems-

      - name: Install dependencies
        run: |
          gem install bundler
          bundle config path vendor/bundle
          bundle install --jobs 4 --retry 3

      - name: Build site
        run: bundle exec jekyll build --destination _site

      # Deploy to GitHub Pages
      - uses: jeffreytse/jekyll-deploy-action@v0.5.1
        with:
          provider: 'github'
          token: ${{ secrets.GITHUB_TOKEN }}
          jekyll_baseurl: '/itemlist'
